name: Notify Site Release Sync

on:
  release:
    types: [published]

jobs:
  dispatch-site-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch release sync event to manifesto-site
        env:
          GH_TOKEN: ${{ secrets.SITE_REPO_DISPATCH_TOKEN }}
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/AlexeyPlatkovsky/manifesto-site/dispatches \
            -d "$(jq -nc \
              --arg version "$VERSION" \
              '{event_type:"manifesto_release_published", client_payload:{version:$version}}')"
