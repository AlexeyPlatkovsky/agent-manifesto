name: Release on version bump

on:
  push:
    branches:
      - main
    paths:
      - MANIFEST.md
      - 01_initial.md
      - 02_review.md
      - 03_evolution.md
      - 04_tool_integration.md
      - protocols/*.md

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read current and previous versions
        id: versions
        shell: bash
        run: |
          current_version=$(awk '/^version:/ {print $2}' MANIFEST.md)

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git show HEAD^:MANIFEST.md > /tmp/prev_manifest.md 2>/dev/null || true
          fi

          if [ -f /tmp/prev_manifest.md ]; then
            previous_version=$(awk '/^version:/ {print $2}' /tmp/prev_manifest.md)
          else
            previous_version=""
          fi

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"

      - name: Decide whether to release
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          current="${{ steps.versions.outputs.current_version }}"
          previous="${{ steps.versions.outputs.previous_version }}"

          if [ -z "$current" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # First release if no previous version exists
          if [ -z "$previous" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "tag=v$current" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release=false
          if [ "$current" != "$previous" ] && [ "$(printf '%s\n%s\n' "$previous" "$current" | sort -V | tail -n1)" = "$current" ]; then
            release=true
          fi

          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "tag=v$current" >> "$GITHUB_OUTPUT"

      - name: Prepare curated release assets
        if: steps.decide.outputs.release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          prefix="agent-manifest-${{ steps.versions.outputs.current_version }}/"
          archive_base="release-artifacts/agent-manifest-${{ steps.versions.outputs.current_version }}"

          archive_paths=(
            README.md
            MANIFEST.md
            01_initial.md
            02_review.md
            03_evolution.md
            04_tool_integration.md
            protocols
          )

          for path in "${archive_paths[@]}"; do
            git ls-tree -d --name-only HEAD "$path" > /dev/null 2>&1 || \
            git ls-files --error-unmatch "$path" > /dev/null 2>&1 || \
            { echo "ERROR: '$path' not found in HEAD" >&2; exit 1; }
          done

          git archive --format=tar.gz --prefix="$prefix" --output="${archive_base}.tar.gz" HEAD "${archive_paths[@]}"
          git archive --format=zip    --prefix="$prefix" --output="${archive_base}.zip"    HEAD "${archive_paths[@]}"

      - name: Build release notes from commit log
        if: steps.decide.outputs.release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          prev_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -n "$prev_tag" ]; then
            range="${prev_tag}..HEAD"
            header="## Changes since ${prev_tag}"
          else
            range="HEAD"
            header="## Changes"
          fi
          {
            echo "$header"
            echo
            git log --no-merges --pretty=format:'- %s (%h)' "$range"
            echo
          } > release-notes.md

      - name: Create Git tag
        if: steps.decide.outputs.release == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.decide.outputs.tag }}"
          git push origin "${{ steps.decide.outputs.tag }}"

      - name: Create GitHub release
        if: steps.decide.outputs.release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.decide.outputs.tag }}
          body_path: release-notes.md
          files: |
            release-artifacts/agent-manifest-${{ steps.versions.outputs.current_version }}.tar.gz
            release-artifacts/agent-manifest-${{ steps.versions.outputs.current_version }}.zip
